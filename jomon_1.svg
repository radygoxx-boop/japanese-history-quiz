<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130" width="100" height="130">
  <defs>
    <linearGradient id="bg_jomon_1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1f00"/>
      <stop offset="100%" stop-color="#1a1200"/>
    </linearGradient>
    <filter id="glow_jomon_1">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="100" height="130" rx="8" fill="url(#bg_jomon_1)"/>

  <!-- ボーダー -->
  <rect width="100" height="130" rx="8" fill="none" stroke="#d4a017" stroke-width="2" opacity="0.9"/>

  <!-- 内側光沢 -->
  <rect x="3" y="3" width="94" height="60" rx="6" fill="rgba(255,220,100,0.15)"/>

  <!-- 時代カラーバー（上部） -->
  <rect x="0" y="0" width="100" height="5" rx="2" fill="#8B6914" opacity="0.8"/>

  <!-- キャラ絵文字エリア -->
  <rect x="10" y="10" width="80" height="75" rx="6" fill="rgba(0,0,0,0.3)"/>
  <text x="50" y="62" font-size="44" text-anchor="middle" dominant-baseline="middle"
        filter="url(#glow_jomon_1)">🏺</text>

  
    <circle cx="15" cy="20" r="1.5" fill="#ffdd44" opacity="0.5"/>
    <circle cx="85" cy="30" r="1.5" fill="#ffdd44" opacity="0.4"/>
    <circle cx="20" cy="80" r="1.5" fill="#ffdd44" opacity="0.4"/>
    <circle cx="80" cy="85" r="1.5" fill="#ffdd44" opacity="0.5"/>

  <!-- レアリティバッジ -->
  <rect x="5" y="88" width="90" height="14" rx="4" fill="#d4a017" opacity="0.25"/>
  <text x="50" y="97" font-size="8" font-weight="bold" text-anchor="middle"
        dominant-baseline="middle" fill="#d4a017" font-family="monospace">SR ★</text>

  <!-- 時代ラベル -->
  <text x="50" y="110" font-size="7" text-anchor="middle" dominant-baseline="middle"
        fill="rgba(255,255,255,0.4)" font-family="sans-serif">縄文・弥生</text>

  <!-- キャラ名 -->
  <text x="50" y="123" font-size="7.5" text-anchor="middle" dominant-baseline="middle"
        fill="rgba(255,255,255,0.85)" font-family="sans-serif" font-weight="bold">縄文のまじない師</text>
</svg>